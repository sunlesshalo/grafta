<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://accounts.google.com https://www.googleapis.com https://sheets.googleapis.com https://oauth2.googleapis.com https://apis.google.com https://analytics.pinelines.eu https://cdn.jsdelivr.net; img-src 'self' data: https://*.googleusercontent.com; font-src 'self'; frame-src 'self' https://accounts.google.com https://*.googleapis.com https://*.googleusercontent.com; object-src 'none'; base-uri 'self'; form-action 'self';">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/report-print.css">
  <title>Med Tracker</title>
</head>
<body>

<!-- ── Sign-in view ── -->
<div id="viewSignin" class="view view-signin hidden">
  <div class="signin-wrap">
    <h1 class="signin-title">Med Tracker</h1>
    <p class="signin-sub">Track your meds, vitals, and labs.<br>Your data stays in your own Google Drive.</p>
    <button id="signinBtn" class="signin-btn">Sign in with Google</button>
    <p class="signin-note">We only access files this app creates.</p>
    <div class="signin-lang">
      <select id="langSelectSignin" class="lang-select" onchange="_app.setLang(this.value)">
        <option value="en">EN</option>
        <option value="ro">RO</option>
        <option value="hu">HU</option>
      </select>
    </div>
  </div>
</div>

<!-- ── Reconnect banner ── -->
<div id="reconnectBanner" class="reconnect-banner hidden">
  <span id="reconnectText">Session expired — </span><button id="reconnectBtn">Reconnect</button>
</div>

<!-- ── Offline banner ── -->
<div id="offlineBanner" class="offline-banner hidden">
  <span id="offlineText">Offline — changes saved locally</span>
</div>

<!-- ── Analytics consent banner ── -->
<div id="consentBanner" class="consent-banner hidden">
  <span id="consentText"></span>
  <div class="consent-btns">
    <button id="consentAccept" class="consent-btn accept"></button>
    <button id="consentDecline" class="consent-btn decline"></button>
  </div>
</div>

<!-- ── Tracker view ── -->
<div id="viewTracker" class="view hidden">

  <div class="day-nav" id="dayNav">
    <button id="prevBtn" onclick="_app.prevDay()">&larr;</button>
    <div class="day-label" id="dayLabel">
      <span class="sync-dot" id="syncDot"></span>
    </div>
    <div class="day-nav-right">
      <button id="nextBtn" onclick="_app.nextDay()">&rarr;</button>
      <button id="editorBtn" class="gear-btn" onclick="_app.openEditor()" title="Edit med schedule">&#9881;</button>
      <button id="chartsBtn" class="gear-btn" onclick="_app.openCharts()" title="Charts">&#128202;</button>
      <button id="reportsBtn" class="gear-btn" onclick="_app.openReports()" title="Reports">&#128203;</button>
      <select id="langSelect" class="lang-select" onchange="_app.setLang(this.value)">
        <option value="en">EN</option>
        <option value="ro">RO</option>
        <option value="hu">HU</option>
      </select>
      <button id="signoutBtn" class="gear-btn" onclick="_app.signOut()" title="Sign out">Sign out</button>
    </div>
  </div>

  <div class="mob-tabs" id="mobTabs">
    <div class="mob-tab active" data-tab="0">Meds</div>
    <div class="mob-tab" data-tab="1">Fluids</div>
    <div class="mob-tab" data-tab="2">Urine</div>
    <div class="mob-tab" data-tab="3">Notes</div>
    <div class="mob-tab" data-tab="4">Labs</div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="grid">
    <div class="col active" id="colMeds"></div>
    <div class="col" id="colWater"></div>
    <div class="col" id="colUrine"></div>
    <div class="col" id="colNotes"></div>
    <div class="col" id="colLabs"></div>
  </div>

</div>

<!-- ── Med editor overlay ── -->
<div id="viewEditor" class="view view-editor hidden">
  <div class="editor-bar">
    <button class="editor-back" onclick="_app.closeEditor()">← Back</button>
    <span class="editor-title">Med Schedule</span>
    <div class="editor-bar-actions">
      <select id="langSelectEditor" class="lang-select" onchange="_app.setLang(this.value)">
        <option value="en">EN</option>
        <option value="ro">RO</option>
        <option value="hu">HU</option>
      </select>
      <button class="editor-save" id="editorSaveBtn" onclick="_editor.save()">Save</button>
    </div>
  </div>
  <div id="editorBody" class="editor-body"></div>
</div>

<!-- ── Charts overlay ── -->
<div id="viewCharts" class="view view-overlay hidden">
  <div class="overlay-bar">
    <button class="overlay-back" onclick="_app.closeCharts()">← Back</button>
    <span class="overlay-title" id="chartsTitleEl">Charts</span>
    <div></div>
  </div>
  <div class="charts-range-bar" id="chartsRangeBar">
    <button class="range-btn active" data-days="7">7d</button>
    <button class="range-btn" data-days="14">14d</button>
    <button class="range-btn" data-days="30">30d</button>
    <button class="range-btn" data-days="90">90d</button>
    <button class="range-btn" data-days="0" id="rangeAllBtn">All</button>
  </div>
  <div id="chartsBody" class="charts-body"></div>
</div>

<!-- ── Reports overlay ── -->
<div id="viewReports" class="view view-overlay hidden">
  <div class="overlay-bar">
    <button class="overlay-back" onclick="_app.closeReports()">← Back</button>
    <span class="overlay-title" id="reportsTitleEl">Reports</span>
    <button id="reportPrintBtn" class="overlay-action hidden" onclick="_reports.print()">Print / PDF</button>
  </div>
  <div class="reports-controls">
    <select id="reportPeriod">
      <option value="7">Last 7 days</option>
      <option value="30" selected>Last 30 days</option>
      <option value="90">Last 90 days</option>
      <option value="custom">Custom range</option>
    </select>
    <div id="reportCustomRange" class="hidden reports-date-range">
      <input type="date" id="reportFrom">
      <span>—</span>
      <input type="date" id="reportTo">
    </div>
    <select id="reportLang">
      <option value="en">English</option>
      <option value="ro">Română</option>
      <option value="hu">Magyar</option>
    </select>
    <button id="reportGenerateBtn" onclick="_reports.generate()">Generate Report</button>
  </div>
  <div id="reportBody" class="report-body"></div>
</div>

<!-- Tooltip popup -->
<div id="tipPopup" class="tip-popup hidden"></div>

<!-- Error toast -->
<div id="errorToast" class="error-toast hidden"></div>

<!-- GIS -->
<script src="https://accounts.google.com/gsi/client" async></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
        integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC"
        crossorigin="anonymous"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
